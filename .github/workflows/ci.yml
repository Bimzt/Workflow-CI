name: CI - MLflow Training Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MLFLOW_TRACKING_URI: https://dagshub.com/Bimzt/Eksperimen_SML_Bima_Setia.mlflow
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  train:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.0 \
                      pandas==2.2.2 numpy==1.26.4 matplotlib==3.9.0 seaborn==0.13.2

      - name: Debug - Check secrets exist
        run: |
          if [ -z "${{ secrets.MLFLOW_TRACKING_USERNAME }}" ]; then
            echo "MLFLOW_TRACKING_USERNAME is EMPTY"
          else
            echo "MLFLOW_TRACKING_USERNAME is SET"
          fi
          if [ -z "${{ secrets.MLFLOW_TRACKING_PASSWORD }}" ]; then
            echo "MLFLOW_TRACKING_PASSWORD is EMPTY"
          else
            echo "MLFLOW_TRACKING_PASSWORD is SET"
          fi

